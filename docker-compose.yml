version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: obras_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-secret}
      MONGO_INITDB_DATABASE: obras_db
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - obras_net

  minio:
    image: minio/minio:latest
    container_name: obras_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - obras_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: obras_backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-secret}@mongo:27017/obras_db?authSource=admin
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
    ports:
      - "4000:4000"
    depends_on:
      - mongo
      - minio
    networks:
      - obras_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
    container_name: obras_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - obras_net

volumes:
  mongo_data:
  minio_data:

networks:
  obras_net:
    driver: bridge
